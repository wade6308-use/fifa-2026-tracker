name: Update FIFA World Cup 26 Dashboard

on:
  workflow_dispatch:
  schedule:
    # 09:17 and 21:17 Asia/Taipei during the tournament.
    - cron: "17 1,13 * * *"

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch latest scores and regenerate dashboard
        run: python scripts/update_worldcup_2026.py

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/worldcup_2026.json index.html
          git commit -m "Update World Cup 26 scores"
          git push
